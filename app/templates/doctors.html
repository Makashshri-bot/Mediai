{% extends 'base.html' %}
{% block content %}
<div id="doctorsPage">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <div>
      <h1 class="h3 mb-1">Doctors</h1>
      <p class="text-muted mb-0">Browse clinicians and filter by specialty or department.</p>
    </div>
    <div class="d-flex gap-2">
      <input id="doctorSearch" class="form-control form-control-sm" type="search" placeholder="Search doctors" />
      <select id="departmentFilter" class="form-select form-select-sm" style="min-width: 200px;"><option value="">All departments</option></select>
    </div>
  </div>

  <div id="doctorsAlert"></div>

  <div class="card shadow-sm border-0 rounded-4 p-4">
    <div id="doctorsLoading" class="text-center py-5"><span class="spinner-border text-primary"></span> Loading doctors...</div>
    <div id="doctorsTableWrapper" class="table-responsive d-none">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr><th>Name</th><th>Specialty</th><th>License</th><th>Department</th></tr>
        </thead>
        <tbody id="doctorsTable"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
