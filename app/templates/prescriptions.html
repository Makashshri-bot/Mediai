{% extends 'base.html' %}
{% block content %}
<div id="prescriptionsPage">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <div>
      <h1 class="h3 mb-1">Prescriptions</h1>
      <p class="text-muted mb-0">View prescription records and access AI explanations.</p>
    </div>
    <a href="{{ url_for('views.ai_prescription_explainer') }}" class="btn btn-outline-primary rounded-pill"><i class="fa-solid fa-capsules me-2"></i>AI Prescriptions</a>
  </div>

  <div id="prescriptionsAlert"></div>

  <div class="card shadow-sm border-0 rounded-4 p-4">
    <div id="prescriptionsLoading" class="text-center py-5"><span class="spinner-border text-primary"></span> Loading prescriptions...</div>
    <div id="prescriptionsTableWrapper" class="table-responsive d-none">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr><th>Medicine</th><th>Dosage</th><th>Instructions</th><th>Patient</th></tr>
        </thead>
        <tbody id="prescriptionsTable"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
