{% extends 'base.html' %}
{% block content %}
<div id="aiPrescriptionExplainerPage">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <div>
      <h1 class="h3 mb-1">Prescription Explainer</h1>
      <p class="text-muted mb-0">Enter prescription details and get a simple explanation for patients.</p>
    </div>
  </div>
  <div id="prescriptionLoading"
class="text-center d-none">

<div class="spinner-border text-primary"></div>

<p>Generating explanation...</p>

</div>
  <div id="aiLoading" class="text-center d-none mt-3">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2">MediAI is thinking...</p>
</div>
  <div id="aiPrescriptionExplainerAlert"></div>

  <div class="card shadow-sm border-0 rounded-4 p-4">
    <form id="prescriptionExplainerForm" class="row g-3">
      <div class="col-md-6"><label class="form-label">Medicine name</label><input id="explainerMedicine" type="text" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label">Dosage</label><input id="explainerDosage" type="text" class="form-control"></div>
      <div class="col-12"><label class="form-label">Instructions</label><textarea id="explainerInstructions" class="form-control" rows="4"></textarea></div>
      <div class="col-12 text-end"><button type="submit" class="btn btn-primary rounded-pill">Explain Prescription</button></div>
    </form>
    <div id="prescriptionExplanationResult" class="mt-4 d-none">
      <h5>Explanation</h5>
      <div class="card rounded-4 p-3 bg-light" id="prescriptionExplanationContent"></div>
    </div>
  </div>
</div>
{% endblock %}
