{% extends 'base.html' %}
{% block content %}
<div id="patientsPage">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <div>
      <h1 class="h3 mb-1">Patients</h1>
      <p class="text-muted mb-0">Search patient records and view contact details.</p>
    </div>
    <input id="patientSearch" class="form-control form-control-sm" type="search" placeholder="Search patients" style="max-width: 320px;" />
  </div>

  <div id="patientsAlert"></div>

  <div class="card shadow-sm border-0 rounded-4 p-4">
    <div id="patientsLoading" class="text-center py-5"><span class="spinner-border text-primary"></span> Loading patients...</div>
    <div id="patientsTableWrapper" class="table-responsive d-none">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr><th>Name</th><th>Email</th><th>Phone</th></tr>
        </thead>
        <tbody id="patientsTable"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
