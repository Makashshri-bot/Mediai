{% extends 'base.html' %}
{% block content %}
<div id="medicinesPage">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <div>
      <h1 class="h3 mb-1">Medicines</h1>
      <p class="text-muted mb-0">Manage inventory, search stock, and monitor low quantity items.</p>
    </div>
    <input id="medicineSearch" class="form-control form-control-sm" type="search" placeholder="Search medicines" style="max-width: 320px;" />
  </div>

  <div id="medicinesAlert"></div>

  <div class="card shadow-sm border-0 rounded-4 p-4">
    <div id="medicinesLoading" class="text-center py-5"><span class="spinner-border text-primary"></span> Loading inventory...</div>
    <div id="medicinesTableWrapper" class="table-responsive d-none">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr><th>Name</th><th>Category</th><th>Stock</th><th>Price</th><th>Manufacturer</th></tr>
        </thead>
        <tbody id="medicinesTable"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
