{% extends 'base.html' %}
{% block content %}
<div id="reportsPage">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <div>
      <h1 class="h3 mb-1">Reports</h1>
      <p class="text-muted mb-0">Review existing records and open AI summarization tools.</p>
    </div>
    <a href="{{ url_for('views.ai_report_summarizer') }}" class="btn btn-outline-primary rounded-pill"><i class="fa-solid fa-file-lines me-2"></i>AI Summarizer</a>
  </div>

  <div id="reportsAlert"></div>

  <div class="card shadow-sm border-0 rounded-4 p-4">
    <div id="reportsLoading" class="text-center py-5"><span class="spinner-border text-primary"></span> Loading reports...</div>
    <div id="reportsTableWrapper" class="table-responsive d-none">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr><th>Title</th><th>Summary</th><th>Date</th></tr>
        </thead>
        <tbody id="reportsTable"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
