{% extends 'base.html' %}
{% block content %}
<div id="notificationsPage">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <div>
      <h1 class="h3 mb-1">Notifications</h1>
      <p class="text-muted mb-0">See your latest alerts, reminders, and system updates.</p>
    </div>
  </div>

  <div id="notificationsAlert"></div>

  <div class="card shadow-sm border-0 rounded-4 p-4">
    <div id="notificationsLoading" class="text-center py-5"><span class="spinner-border text-primary"></span> Loading notifications...</div>
    <div id="notificationsList" class="list-group d-none"></div>
  </div>
</div>
{% endblock %}
